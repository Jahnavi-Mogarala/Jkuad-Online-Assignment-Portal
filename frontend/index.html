<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKUAD Assignment Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f4f7fb; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif;}
        .loader { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand { position: absolute; top: 10%; font-size: 2rem; font-weight: 800; color: #1e293b; letter-spacing: -0.5px; }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Wait slightly for fake loading effect, feels more premium
            setTimeout(() => {
                const token = localStorage.getItem('token');
                const role = parseInt(localStorage.getItem('role_id'));
                
                if (token && role) {
                    if (role === 1) window.location.href = 'pages/admin-dashboard.html';
                    else if (role === 2) window.location.href = 'pages/teacher-dashboard.html';
                    else if (role === 3) window.location.href = 'pages/student-dashboard.html';
                    else window.location.href = 'pages/login.html';
                } else {
                    window.location.href = 'pages/login.html';
                }
            }, 600);
        });
    </script>
</head>
<body>
    <script src="js/demo-data.js?v=5"></script>
    <script src="js/mock-engine.js?v=5"></script>
    <script src="js/components.js?v=5"></script>
</body>
</html>
